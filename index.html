<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulateur Immo vs Location</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>

  <!-- Chart.js (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Styles personnalisés -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="bg-gray-950 text-gray-100 min-h-screen p-4 lg:p-6">

  <!-- ══════════════════════════════════════════════
       EN-TÊTE
       ══════════════════════════════════════════════ -->
  <header class="mb-6 flex items-start justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-white">
        Simulateur Immo <span class="text-blue-400">vs</span> Location
      </h1>
      <p class="text-sm text-gray-400 mt-0.5">
        Comparez l'évolution de votre patrimoine selon votre stratégie
      </p>
    </div>
    <button id="shareBtn" class="btn-share mt-1" title="Copier le lien de partage dans le presse-papier">
      Partager
    </button>
  </header>

  <!-- ══════════════════════════════════════════════
       INPUTS GLOBAUX
       ══════════════════════════════════════════════ -->
  <section id="globalInputs" class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">

    <!-- Profil Utilisateur -->
    <div class="card">
      <p class="section-title">Profil Utilisateur</p>
      <div class="grid grid-cols-2 gap-3">

        <div>
          <label class="label">Salaire net / mois (€)</label>
          <input type="number" id="netSalary" class="input-field" value="3500" min="0" step="100" />
        </div>

        <div>
          <label class="label">Capital total (€)</label>
          <input type="number" id="totalCapital" class="input-field" value="80000" min="0" step="1000" />
        </div>

        <div>
          <label class="label">Apport max dédié (€)</label>
          <input type="number" id="maxContribution" class="input-field" value="50000" min="0" step="1000" />
        </div>

        <div>
          <label class="label">Loyer actuel (€/mois)</label>
          <input type="number" id="currentRent" class="input-field" value="900" min="0" step="50" />
        </div>

        <div class="col-span-2">
          <label class="label">
            Taux d'endettement max :
            <span id="debtRatioVal" class="text-blue-400 font-semibold">35%</span>
          </label>
          <input type="range" id="debtRatio" min="20" max="45" step="1" value="35" class="mt-1" />
        </div>

      </div>
    </div>

    <!-- Hypothèses de Marché -->
    <div class="card">
      <p class="section-title">Hypothèses de Marché</p>
      <div class="space-y-3">

        <div>
          <label class="label">
            Inflation annuelle :
            <span id="inflationVal" class="text-blue-400 font-semibold">2,0%</span>
          </label>
          <input type="range" id="inflationRate" min="0" max="8" step="0.1" value="2" />
        </div>

        <div>
          <label class="label">
            Croissance valeur bien :
            <span id="growthVal" class="text-blue-400 font-semibold">2,0%</span>
          </label>
          <input type="range" id="propertyGrowthRate" min="0" max="10" step="0.1" value="2" />
        </div>

        <div>
          <label class="label">
            Rendement épargne (coût d'opportunité) :
            <span id="savingsVal" class="text-blue-400 font-semibold">5,0%</span>
          </label>
          <input type="range" id="savingsReturnRate" min="0" max="12" step="0.1" value="5" />
        </div>

        <div>
          <label class="label">
            Durée de simulation :
            <span id="simYearsVal" class="text-blue-400 font-semibold">20 ans</span>
          </label>
          <input type="range" id="simYears" min="5" max="30" step="1" value="20" />
        </div>

        <div>
          <label class="label">
            Décote à l'achat :
            <span id="decoteVal" class="text-blue-400 font-semibold">15%</span>
            <span class="text-gray-500 text-xs ml-1">(perte immédiate sur valeur de revente)</span>
          </label>
          <input type="range" id="decote" min="0" max="30" step="1" value="15" />
        </div>

      </div>
    </div>

  </section>

  <!-- ══════════════════════════════════════════════
       SCÉNARIOS D'ACHAT (dynamiques)
       ══════════════════════════════════════════════ -->
  <section class="mb-4">

    <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
      <h2 class="text-lg font-semibold text-gray-200">Scénarios d'achat</h2>
      <button id="addScenarioBtn" class="btn-add-scenario">
        + Ajouter un scénario
      </button>
    </div>

    <!-- Conteneur des cartes scénario (rempli dynamiquement par scenarios.js) -->
    <div id="scenariosContainer" class="grid grid-cols-1 xl:grid-cols-2 gap-4"></div>

  </section>

  <!-- ══════════════════════════════════════════════
       GRAPHIQUE
       ══════════════════════════════════════════════ -->
  <section class="card mb-4">

    <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <h2 class="text-base font-semibold text-white">Évolution du patrimoine net</h2>
      <div id="chartLegend" class="flex flex-wrap gap-4 text-xs text-gray-400"></div>
    </div>

    <div style="height: 360px; position: relative;">
      <canvas id="wealthChart"></canvas>
    </div>

    <div id="breakevenInfo" class="mt-3 text-xs text-gray-500 text-center"></div>

  </section>

  <!-- ══════════════════════════════════════════════
       ANALYSE LOCATAIRE (rempli dynamiquement)
       ══════════════════════════════════════════════ -->
  <section id="tenantAnalysis" class="card mb-4"></section>

  <!-- ══════════════════════════════════════════════
       SCRIPTS (ordre important)
       ══════════════════════════════════════════════ -->
  <script src="js/finance.js"></script>
  <script src="js/chart-manager.js"></script>
  <script src="js/scenarios.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
